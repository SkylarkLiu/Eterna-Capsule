services:
  eterna-server:
    build: ./eterna-server
    container_name: eterna-server
    ports:
      - "3000:3000"
    volumes:
      - eterna_data:/app/data
      - eterna_uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  eterna_data:
  eterna_uploads:
